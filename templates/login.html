<!DOCTYPE html>
<html lang="en-CA">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PharmacyPrep – Login</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
      --bg: #f0f0ee;
      --card: #ffffff;
      --border: rgba(0,0,0,.1);
      --border-hover: rgba(0,0,0,.3);
      --text: #111111;
      --muted: rgba(17,17,17,.45);
      --pill-bg: rgba(0,0,0,.05);
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
      linear-gradient(rgba(0,0,0,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,.06) 1px, transparent 1px);
      background-size: 48px 48px;
      animation: gridDrift 40s linear infinite;
    }
    @keyframes gridDrift {
      from { background-position: 0 0; }
      to   { background-position: 48px 48px; }
    }
    .bg-glow {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(0,0,0,.04) 0%, transparent 70%);
      pointer-events: none;
    }

    nav {
      position: relative; z-index: 10;
      height: 56px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 24px; gap: 10px; flex-shrink: 0;
      backdrop-filter: blur(12px);
      background: rgba(240,240,238,.85);
    }
    .nav-logo-icon {
      width: 32px; height: 32px;
      background: #111;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .nav-logo-icon i { color: #f0f0ee; width: 16px; height: 16px; }
    .nav-logo-title { font-weight: 700; font-size: .9rem; }
    .nav-logo-sub   { font-size: .7rem; color: var(--muted); margin-left: 2px; }

    .page {
      position: relative; z-index: 5;
      flex: 1; display: flex;
      align-items: center; justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%; max-width: 420px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px 36px;
      box-shadow: 0 0 0 1px rgba(0,0,0,.04), 0 32px 64px rgba(0,0,0,.1);
      animation: cardIn .5s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes cardIn {
      from { opacity:0; transform:translateY(20px) scale(.98); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }

    .card-eyebrow {
      font-size: .72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .12em;
      color: var(--muted); margin-bottom: 10px;
      display: flex; align-items: center; gap: 7px;
    }
    .card-eyebrow::before {
      content:''; width:18px; height:1px; background:var(--muted);
    }

    .card-title {
      font-family: 'Instrument Serif', serif;
      font-size: 2.1rem; font-weight: 400;
      line-height: 1.1; letter-spacing: -.02em;
      margin-bottom: 6px;
    }
    .card-title em { font-style: italic; color: var(--muted); }

    .card-sub {
      font-size: .84rem; color: var(--muted);
      margin-bottom: 32px; font-weight: 300;
    }

    .error-msg {
      background: rgba(220,38,38,.1);
      border: 1px solid rgba(220,38,38,.3);
      color: #f87171; border-radius: 9px;
      padding: 10px 13px; font-size: .83rem;
      margin-bottom: 20px; display: none;
      align-items: center; gap: 8px;
    }
    .error-msg.show { display: flex; }

    .field { margin-bottom: 14px; }
    .field label {
      display: block; font-size: .72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .09em;
      color: var(--muted); margin-bottom: 7px;
    }
    .field input {
      width: 100%; padding: 12px 14px;
      border: 1px solid var(--border); border-radius: 10px;
      background: rgba(0,0,0,.03);
      font-family: inherit; font-size: .92rem; color: var(--text);
      outline: none; transition: border-color .2s, background .2s;
    }
    .field input::placeholder { color: rgba(17,17,17,.25); }
    .field input:focus {
      border-color: var(--border-hover);
      background: #fff;
    }

    .autofill-row {
      display: flex; align-items: center; gap: 8px; margin-bottom: 20px;
    }
    .autofill-label { font-size: .76rem; color: var(--muted); }

    .autofill-btn {
      padding: 5px 13px; border-radius: 99px;
      border: 1px solid var(--border);
      background: var(--pill-bg); color: var(--text);
      font-family: inherit; font-size: .76rem; font-weight: 600;
      cursor: pointer; transition: all .18s;
      display: flex; align-items: center; gap: 5px;
    }
    .autofill-btn:hover { background: rgba(255,255,255,.1); border-color: var(--border-hover); }
    .autofill-btn i { width: 12px; height: 12px; }
    .autofill-btn:disabled { opacity:.5; cursor:not-allowed; }

    .login-btn {
      width: 100%; padding: 13px; border: none; border-radius: 11px;
      background: #111; color: #f0f0ee;
      font-family: inherit; font-size: .95rem; font-weight: 700;
      cursor: pointer; transition: all .2s;
      display: flex; align-items: center; justify-content: center;
      gap: 8px; letter-spacing: -.01em;
    }
    .login-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,0,0,.15); }
    .login-btn:active { transform: none; }
    .login-btn i { width: 16px; height: 16px; }

    .divider { height:1px; background:var(--border); margin: 28px 0 18px; }

    .card-footer {
      font-size: .74rem; color: var(--muted);
      text-align: center; line-height: 1.6;
    }

    footer {
      position: relative; z-index: 5;
      height: 40px; flex-shrink: 0;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: .72rem; color: var(--muted);
    }
  </style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>

<nav>
  <div class="nav-logo-icon"><i data-lucide="stethoscope"></i></div>
  <span class="nav-logo-title">OSCE Simulator</span>
  <span class="nav-logo-sub">Powered by PharmacyPrep</span>
</nav>

<div class="page">
  <div class="card">

    <div class="card-eyebrow">Secure Access</div>
    <div class="card-title">Welcome <em>back.</em></div>
    <div class="card-sub">Enter your credentials to access your training dashboard.</div>

    <div class="error-msg" id="errorMsg">
      <i data-lucide="alert-circle" style="width:15px;height:15px;flex-shrink:0;"></i>
      Incorrect username or password. Please try again.
    </div>

    <form method="POST" action="/login">
      <div class="field">
        <label>Username</label>
        <input type="text" id="usernameInput" name="username" placeholder="Enter your username" autocomplete="username" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="passwordInput" name="password" placeholder="Enter your password" autocomplete="current-password" required>
      </div>

      <div class="autofill-row">
        <span class="autofill-label">Demo credentials?</span>
        <button type="button" class="autofill-btn" id="autofillBtn">
          <i data-lucide="zap"></i> Autofill
        </button>
      </div>

      <button type="submit" class="login-btn">
        <i data-lucide="log-in"></i>
        Sign In
      </button>
    </form>

    <div class="divider"></div>
    <div class="card-footer">OSCE Simulator · AI-Driven Pharmacy Training</div>

  </div>
</div>

<footer>© 2025 PharmacyPrep · OSCE Simulator | All rights reserved</footer>

<script>
  lucide.createIcons();

  if (new URLSearchParams(window.location.search).get('error')) {
    document.getElementById('errorMsg').classList.add('show');
  }

  document.getElementById('autofillBtn').addEventListener('click', async () => {
    const userInput = document.getElementById('usernameInput');
    const passInput = document.getElementById('passwordInput');
    const btn = document.getElementById('autofillBtn');

    btn.disabled = true;

    const typeInto = (el, text, delay=55) => new Promise(resolve => {
      el.value = '';
      let i = 0;
      const iv = setInterval(()=>{
        el.value += text[i++];
        if(i >= text.length){ clearInterval(iv); resolve(); }
      }, delay);
    });

    await typeInto(userInput, 'admin', 65);
    await new Promise(r => setTimeout(r, 180));
    await typeInto(passInput, 'pharmacy2025', 50);

    btn.disabled = false;
    btn.innerHTML = '<i data-lucide="check"></i> Done';
    lucide.createIcons();
  });
</script>
</body>
</html>
